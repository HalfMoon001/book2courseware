<!--
  editor.html - bundled in-browser editor (CSS + UI DOM + JS)
  Insert this file as-is right before the closing body tag in generated courseware.
  Provides: toggle button (top-right), edit toolbar (hand/pencil mode),
  SVG editor V2, undo/redo, save/discard, download HTML.
  Shortcuts: H=hand V=pencil Ctrl+Z/Y=undo/redo Del=delete Esc=deselect
  Persistence: "Save" writes a snapshot to localStorage['book2ppt:' + pathname];
  the IIFE restores it on page load, so edits survive refresh without file export.
  NOTE: this comment must NOT contain the literal closing-body string because
  assembly scripts may use str.replace() on that marker.
-->

<style>
/* ========== EDIT MODE ========== */
.edit-toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 40px;
  background: #2c3e50; color: #fff; z-index: 2000;
  display: none; align-items: center; padding: 0 16px; gap: 12px;
  font-family: system-ui, sans-serif; font-size: 14px;
}
.edit-toolbar.active { display: flex; }
.edit-toolbar button {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; padding: 4px 14px; border-radius: 6px; cursor: pointer;
  font-size: 13px; transition: all 0.2s;
}
.edit-toolbar button:hover { background: rgba(255,255,255,0.3); }
.edit-toolbar .save-btn { background: #4a90d9; border-color: #4a90d9; }
.edit-toolbar .save-btn:hover { background: #3a7bc8; }
.edit-toolbar .exit-btn { background: #e06b6b; border-color: #e06b6b; }

.edit-toggle {
  position: fixed; top: 8px; right: 12px; z-index: 2001;
  background: rgba(44,62,80,0.8); color: #fff; border: none;
  padding: 6px 16px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-family: system-ui, sans-serif;
  backdrop-filter: blur(5px); transition: all 0.2s;
}
.edit-toggle:hover { background: rgba(44,62,80,1); }

/* Edit-mode layout fix · DO NOT revert to `padding-top: 52px` here.
   The original rule changed slide padding on every toggle, which triggers a
   flex reflow: because `.slide` is display:flex column with `.slide-row { flex:1 }`
   and `.slide-col { justify-content:center }`, a 40px padding change causes
   center-justified children to absorb HALF the shrinkage. Different elements
   shift by different amounts, so dragged elements (whose drag-transform is in
   viewport px) drift relative to unmoved siblings on exit.
   Fix: shift the active slide with a pure CSS transform (visual only, no
   layout recalc). Every descendant moves by exactly 40px — no drift. */
body.edit-mode .slide.active { transform: translateY(40px); }

body.edit-mode .slide-title,
body.edit-mode .slide-subtitle,
body.edit-mode .info-card,
body.edit-mode .section-main-title,
body.edit-mode .section-number,
body.edit-mode .highlight-box,
body.edit-mode .cover-title,
body.edit-mode .cover-chapter,
body.edit-mode [style*="font-size"] {
  outline: 1px dashed rgba(74,144,217,0.3);
  outline-offset: 2px;
  cursor: text;
  min-height: 1em;
}

body.edit-mode .slide-title:hover,
body.edit-mode .info-card:hover,
body.edit-mode [contenteditable]:hover {
  outline-color: #4a90d9;
  background: rgba(74,144,217,0.03);
}

body.edit-mode [contenteditable]:focus {
  outline: 2px solid #4a90d9;
  background: rgba(74,144,217,0.05);
}

/* ========== SVG EDIT MODE ========== */
body.edit-mode svg.svg-editable {
  cursor: crosshair;
  outline: 2px dashed rgba(74,144,217,0.4);
  outline-offset: 4px;
}
body.edit-mode svg.svg-editable:hover {
  outline-color: #4a90d9;
}

/* Selected SVG element highlight */
.svg-selected-outline {
  pointer-events: none;
  fill: none;
  stroke: #4a90d9;
  stroke-width: 2;
  stroke-dasharray: 5 3;
  animation: svgSelDash 0.6s linear infinite;
}
@keyframes svgSelDash { to { stroke-dashoffset: -8; } }

/* SVG element hover in edit mode */
body.edit-mode svg.svg-editable *:not(.svg-selected-outline):not(.svg-drag-handle):hover {
  filter: drop-shadow(0 0 3px rgba(74,144,217,0.6));
  cursor: move;
}

/* Drag handle circles */
.svg-drag-handle {
  fill: #4a90d9;
  stroke: #fff;
  stroke-width: 2;
  cursor: nwse-resize;
  pointer-events: all;
}
.svg-drag-handle:hover {
  fill: #e06b6b;
}

/* SVG properties panel */
.svg-prop-panel {
  position: fixed;
  top: 48px;
  right: 8px;
  width: 240px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 2010;
  font-family: system-ui, sans-serif;
  font-size: 13px;
  display: none;
}
.svg-prop-panel.active { display: block; }
.svg-prop-panel .panel-header {
  padding: 10px 14px;
  background: #2c3e50;
  color: #fff;
  border-radius: 10px 10px 0 0;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.svg-prop-panel .panel-header button {
  background: none; border: none; color: #fff; font-size: 16px; cursor: pointer;
}
.svg-prop-section {
  padding: 10px 14px;
  border-bottom: 1px solid #eee;
}
.svg-prop-section:last-child { border-bottom: none; }
.svg-prop-section label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 5px 0;
  color: #555;
  font-size: 12px;
}
.svg-prop-section label input,
.svg-prop-section label select {
  width: 110px;
  padding: 3px 6px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 12px;
}
.svg-prop-section label input[type="color"] {
  width: 32px; height: 24px; padding: 0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
}
.svg-prop-section label input[type="range"] {
  width: 90px;
}
.svg-prop-section .prop-btn {
  display: inline-block;
  background: #f5f5f5;
  border: 1px solid #ddd;
  border-radius: 5px;
  padding: 4px 10px;
  margin: 3px 4px 3px 0;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.svg-prop-section .prop-btn:hover { background: #4a90d9; color: #fff; border-color: #4a90d9; }
.svg-prop-section .prop-btn.danger:hover { background: #e06b6b; border-color: #e06b6b; }

/* SVG Add toolbar (inside edit toolbar) */
.svg-add-bar {
  display: none;
  align-items: center;
  gap: 6px;
  margin-left: 8px;
  padding-left: 8px;
  border-left: 1px solid rgba(255,255,255,0.3);
}
body.edit-mode.mode-pencil .svg-add-bar { display: flex; }
.svg-add-bar button {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  padding: 3px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.svg-add-bar button:hover { background: rgba(74,144,217,0.5); }
.svg-add-bar button.adding { background: #4a90d9; border-color: #4a90d9; }

/* Mode buttons */
.mode-btn {
  background: rgba(255,255,255,0.12) !important;
  border: 1px solid rgba(255,255,255,0.25) !important;
  font-size: 13px !important;
  padding: 4px 12px !important;
  transition: all 0.15s;
}
.mode-btn.active {
  background: #4a90d9 !important;
  border-color: #4a90d9 !important;
}

/* Hand mode cursor */
body.edit-mode.mode-hand { cursor: grab; }
body.edit-mode.mode-hand:active { cursor: grabbing; }
body.edit-mode.mode-hand .slide * { cursor: grab; }
body.edit-mode.mode-hand .slide *:active { cursor: grabbing; }

/* Pencil mode cursor */
body.edit-mode.mode-pencil { cursor: default; }
body.edit-mode.mode-pencil svg.svg-editable { cursor: crosshair; }

/* HTML element selection highlight */
body.edit-mode .html-selected {
  outline: 2px solid #4a90d9 !important;
  outline-offset: 2px;
}
body.edit-mode .html-dragging {
  opacity: 0.8;
  z-index: 100;
}

/* SVG whole-selection */
body.edit-mode .svg-whole-selected {
  outline: 3px solid #4a90d9 !important;
  outline-offset: 4px;
  outline-style: dashed;
}

/* Undo toast */
.editor-toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #2c3e50;
  color: #fff;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-family: system-ui, sans-serif;
  z-index: 3000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.editor-toast.show { opacity: 1; }

/* Locked elements */
.editor-locked {
  pointer-events: none !important;
  opacity: 0.7;
}
.editor-locked::after {
  content: '🔒';
  position: absolute;
  top: 0; right: 0;
  font-size: 10px;
}

/* Multi-select */
.svg-multi-selected {
  filter: drop-shadow(0 0 2px rgba(74,144,217,0.8));
}

/* Dynamic line (dashed animated) */
.svg-dynamic-line {
  stroke-dasharray: 8 4;
  animation: dashFlow 1s linear infinite;
}
</style>

<script>
// ========== EDIT MODE ==========
var editMode = false;

function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('editToolbar').classList.toggle('active', editMode);
  document.querySelector('.edit-toggle').style.display = editMode ? 'none' : '';
  if (!editMode) {
    // Remove contenteditable from all elements
    document.querySelectorAll('[contenteditable]').forEach(function(el) {
      el.removeAttribute('contenteditable');
    });
  }
}

function changeColor() {
  var color = prompt('输入颜色代码（如 #e06b6b 红色, #4a90d9 蓝色, #5a9e6f 绿色）:', '#e06b6b');
  if (color) document.execCommand('foreColor', false, color);
}

// ========== EDITOR V2: HAND/PENCIL MODE + UNDO + SAVE/DISCARD ==========
(function() {
  var NS = 'http://www.w3.org/2000/svg';

  // ---- State ----
  var selectedEl = null;       // currently selected element (SVG child or HTML el)
  var selectedIsSvg = false;   // is selected el inside an SVG?
  var selectedIsWholeSvg = false; // is the whole SVG selected?
  var selectionRect = null;    // SVG selection rect overlay
  var editorMode = 'hand';     // 'hand' or 'pencil'
  var addingType = null;       // SVG shape being drawn
  var isDragging = false;
  var dragStart = { x: 0, y: 0 };
  var drawStart = null;
  var pathPoints = [];
  var isDirty = false;

  // ---- Undo/Redo (snapshot-based) ----
  var undoStack = [];
  var redoStack = [];
  var MAX_UNDO = 50;
  var editSnapshot = null; // HTML state when entering edit mode (for discard)

  function getSlideContent() {
    // Snapshot all slides as outerHTML so structural changes (add/delete) are undoable
    var slides = document.querySelectorAll('.slide');
    var data = [];
    slides.forEach(function(s) {
      var clone = s.cloneNode(true);
      // Strip transient edit UI before snapshotting
      clone.querySelectorAll('[contenteditable]').forEach(function(el) { el.removeAttribute('contenteditable'); });
      clone.classList.remove('active');
      data.push(clone.outerHTML);
    });
    return JSON.stringify(data);
  }

  function restoreSlideContent(json) {
    var data = JSON.parse(json);
    var existing = document.querySelectorAll('.slide');
    if (existing.length === 0) return;
    // Remember which slide the user was on so undo/redo does not yank them to page 0
    var prevIdx = 0;
    existing.forEach(function(s, i) { if (s.classList.contains('active')) prevIdx = i; });
    var parent = existing[0].parentNode;
    var anchor = existing[existing.length - 1].nextSibling;
    existing.forEach(function(s) { s.remove(); });
    var tmp = document.createElement('div');
    data.forEach(function(html) {
      tmp.innerHTML = html;
      var el = tmp.firstElementChild;
      if (!el) return;
      if (anchor) parent.insertBefore(el, anchor);
      else parent.appendChild(el);
    });
    rebuildNavDots();
    var all = document.querySelectorAll('.slide');
    // Clamp to the new slide count (undo may have added/removed slides)
    var newIdx = Math.max(0, Math.min(prevIdx, all.length - 1));
    all.forEach(function(s, i) { s.classList.toggle('active', i === newIdx); });
    if (window.goTo) window.goTo(newIdx);
    if (editMode) setContentEditable(true);
  }

  function rebuildNavDots() {
    var navBar = document.querySelector('.nav-bar');
    if (!navBar) return;
    var pageSpan = navBar.querySelector('.nav-page');
    navBar.querySelectorAll('.nav-dot').forEach(function(d) { d.remove(); });
    var slides = document.querySelectorAll('.slide');
    slides.forEach(function(s, i) {
      var dot = document.createElement('button');
      dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('data-target', i);
      dot.addEventListener('click', function() { if (window.goTo) window.goTo(i); });
      if (pageSpan) navBar.insertBefore(dot, pageSpan);
      else navBar.appendChild(dot);
    });
    if (pageSpan) pageSpan.textContent = '1 / ' + slides.length;
  }

  // Override scripts.js goTo so it always re-queries — handles add/delete
  window.goTo = function(index) {
    var slides = document.querySelectorAll('.slide');
    var dots = document.querySelectorAll('.nav-dot');
    var pageLabel = document.querySelector('.nav-page');
    var total = slides.length;
    if (total === 0) return;
    if (index < 0) index = 0;
    if (index >= total) index = total - 1;
    slides.forEach(function(s, i) { s.classList.toggle('active', i === index); });
    dots.forEach(function(d, i) { d.classList.toggle('active', i === index); });
    if (pageLabel) pageLabel.textContent = (index + 1) + ' / ' + total;
    window.scrollTo(0, 0);
    window._currentSlide = index;
  };

  window.editorDeleteSlide = function() {
    if (!editMode) return;
    var slides = document.querySelectorAll('.slide');
    if (slides.length <= 1) { showToast('⚠️ 至少保留一页'); return; }
    var idx = -1;
    slides.forEach(function(s, i) { if (s.classList.contains('active')) idx = i; });
    if (idx < 0) idx = 0;
    if (!confirm('确定删除第 ' + (idx + 1) + ' / ' + slides.length + ' 页？\n（可以用 ↩ 撤回恢复）')) return;
    pushUndo();
    slides[idx].remove();
    rebuildNavDots();
    var remaining = document.querySelectorAll('.slide');
    var newIdx = Math.min(idx, remaining.length - 1);
    window.goTo(newIdx);
    showToast('🗑 已删除，剩 ' + remaining.length + ' 页');
  };

  function pushUndo() {
    // Clean up selection UI before snapshot
    cleanupSelectionUI();
    undoStack.push(getSlideContent());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
    isDirty = true;
  }

  window.editorUndo = function() {
    if (undoStack.length === 0) { showToast('没有可撤回的操作'); return; }
    cleanupSelectionUI();
    redoStack.push(getSlideContent());
    var state = undoStack.pop();
    restoreSlideContent(state);
    reattachSvgListeners();
    selectedEl = null;
    showToast('↩ 已撤回');
  };

  window.editorRedo = function() {
    if (redoStack.length === 0) { showToast('没有可重做的操作'); return; }
    cleanupSelectionUI();
    undoStack.push(getSlideContent());
    var state = redoStack.pop();
    restoreSlideContent(state);
    reattachSvgListeners();
    selectedEl = null;
    showToast('↪ 已重做');
  };

  // ---- Toast ----
  function showToast(msg) {
    var t = document.getElementById('editorToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'editorToast';
      t.className = 'editor-toast';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.classList.remove('show'); }, 1500);
  }

  // ---- Cleanup selection UI artifacts ----
  function cleanupSelectionUI() {
    document.querySelectorAll('.svg-selected-outline, .svg-drag-handle, #_tmpDraw, #_tmpPath').forEach(function(el) {
      if (el.parentNode) el.parentNode.removeChild(el);
    });
    document.querySelectorAll('.html-selected, .svg-whole-selected').forEach(function(el) {
      el.classList.remove('html-selected', 'svg-whole-selected');
    });
    selectionRect = null;
  }

  // ---- Mode switching ----
  window.setEditorMode = function(mode) {
    editorMode = mode;
    document.getElementById('modeHand').classList.toggle('active', mode === 'hand');

    }

    var target = e.target;

    // Hand mode: click SVG background → select whole SVG
    if (editorMode === 'hand' && target === svg) {
      selectWholeSvg(svg);
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
      dragUndoPushed = false;
      e.preventDefault();
      return;
    }

    // Click SVG background in pencil mode → deselect
    if (target === svg) { editorDeselect(); return; }
    if (target.classList.contains('svg-selected-outline') || target.classList.contains('svg-drag-handle')) return;

    // Find meaningful parent
    var meaningful = target;
    var parent = target.parentElement;
    while (parent && parent !== svg) {
      if (parent.tagName.toLowerCase() === 'g' && parent.parentElement === svg) { meaningful = parent; break; }
      if (parent.parentElement === svg) { meaningful = parent; break; }
      parent = parent.parentElement;
    }

    // Shift+click for multi-select
    if (e.shiftKey) {
      addToMultiSelect(meaningful);
      e.preventDefault();
      return;
    }

    if (multiSelected.length > 0) clearMultiSelect();
    selectSvgElement(meaningful);
    isDragging = true;
    dragStart = { x: pt.x, y: pt.y };
    dragUndoPushed = false;
    e.preventDefault();
  }

  function onSvgMouseMove(e) {
    if (!editMode) return;
    var svg = e.currentTarget;

    // Drawing preview
    if (editorMode === 'pencil' && addingType && drawStart && addingType !== 'text' && addingType !== 'path') {
      var pt = svgPoint(svg, e.clientX, e.clientY);
      var dx = pt.x - drawStart.x; var dy = pt.y - drawStart.y;
      var tmp = svg.querySelector('#_tmpDraw');
      if (!tmp) {
        if (addingType === 'line' || addingType === 'arrow' || addingType === 'dashLine') tmp = document.createElementNS(NS, 'line');
        else if (addingType === 'circle') tmp = document.createElementNS(NS, 'circle');
        else if (addingType === 'ellipse') tmp = document.createElementNS(NS, 'ellipse');
        else tmp = document.createElementNS(NS, 'rect');
        tmp.id = '_tmpDraw';
        tmp.setAttribute('fill', (addingType === 'line' || addingType === 'arrow' || addingType === 'dashLine') ? 'none' : 'rgba(74,144,217,0.2)');
        tmp.setAttribute('stroke', '#4a90d9'); tmp.setAttribute('stroke-width', '2');
        tmp.setAttribute('stroke-dasharray', '4 2');
        svg.appendChild(tmp);
      }
      if (addingType === 'line' || addingType === 'arrow' || addingType === 'dashLine') {
        tmp.setAttribute('x1', drawStart.x); tmp.setAttribute('y1', drawStart.y);
        tmp.setAttribute('x2', pt.x); tmp.setAttribute('y2', pt.y);
      } else if (addingType === 'circle') {
        tmp.setAttribute('cx', drawStart.x); tmp.setAttribute('cy', drawStart.y);
        tmp.setAttribute('r', Math.sqrt(dx*dx + dy*dy));
      } else if (addingType === 'ellipse') {
        tmp.setAttribute('cx', drawStart.x + dx/2); tmp.setAttribute('cy', drawStart.y + dy/2);
        tmp.setAttribute('rx', Math.abs(dx/2)); tmp.setAttribute('ry', Math.abs(dy/2));
      } else {
        tmp.setAttribute('x', Math.min(drawStart.x, pt.x)); tmp.setAttribute('y', Math.min(drawStart.y, pt.y));
        tmp.setAttribute('width', Math.abs(dx)); tmp.setAttribute('height', Math.abs(dy));
      }
      return;
    }

    // Drag: whole SVG
    if (isDragging && selectedEl && selectedIsWholeSvg) {
      if (!dragUndoPushed) { pushUndo(); dragUndoPushed = true; }
      var ddx = e.clientX - dragStart.x;
      var ddy = e.clientY - dragStart.y;
      moveHtmlElement(selectedEl, ddx, ddy);
      dragStart = { x: e.clientX, y: e.clientY };
      return;
    }

    // Drag: SVG child element
    if (isDragging && selectedEl && selectedIsSvg) {
      var pt = svgPoint(svg, e.clientX, e.clientY);
      if (!dragUndoPushed) { pushUndo(); dragUndoPushed = true; }
      moveSvgElement(selectedEl, pt.x - dragStart.x, pt.y - dragStart.y);
      dragStart = { x: pt.x, y: pt.y };
      refreshSelection();
      updatePropPanel(true);
    }
  }

  function onSvgMouseUp(e) {
    if (!editMode) return;
    var svg = e.currentTarget;

    // Finish drawing
    if (editorMode === 'pencil' && addingType && drawStart && addingType !== 'text' && addingType !== 'path') {
      var pt = svgPoint(svg, e.clientX, e.clientY);
      var tmp = svg.querySelector('#_tmpDraw');
      if (tmp) {
        var dx = pt.x - drawStart.x; var dy = pt.y - drawStart.y;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
          tmp.removeAttribute('id');
          tmp.setAttribute('stroke-dasharray', '');
          if (addingType === 'rect') { tmp.setAttribute('fill', 'rgba(74,144,217,0.15)'); tmp.setAttribute('rx', '3'); }
          else if (addingType === 'circle' || addingType === 'ellipse') { tmp.setAttribute('fill', 'rgba(74,144,217,0.15)'); }
          else if (addingType === 'arrow') { ensureArrowMarker(svg); tmp.setAttribute('marker-end', 'url(#svg-editor-arrow)'); tmp.setAttribute('stroke', '#2c3e50'); }
          else if (addingType === 'dashLine') { tmp.setAttribute('stroke', '#2c3e50'); tmp.setAttribute('stroke-dasharray', '8 4'); tmp.classList.add('svg-dynamic-line'); }
          else if (addingType === 'line') { tmp.setAttribute('stroke', '#2c3e50'); }
          selectSvgElement(tmp);
        } else {
          if (tmp.parentNode) tmp.parentNode.removeChild(tmp);
        }
      }
      drawStart = null;
      cancelAddMode();
      return;
    }
    isDragging = false;
  }

  function onSvgDblClick(e) {
    if (!editMode || editorMode !== 'pencil') return;
    var target = e.target;
    if (target.tagName.toLowerCase() === 'text' || target.tagName.toLowerCase() === 'tspan') {
      var newText = prompt('编辑文字:', target.textContent);
      if (newText !== null) {
        pushUndo();
        target.textContent = newText;
        if (selectedEl === target) updatePropPanel(true);
      }
    }
  }

  // ---- HTML element mouse events (for hand mode) ----
  var htmlDragEl = null;
  var htmlDragStart = { x: 0, y: 0 };
  var htmlDragUndoPushed = false;

  function isEditableTarget(el) {
    if (!el) return false;
    if (el.closest('.edit-toolbar') || el.closest('.svg-prop-panel') || el.closest('.nav-bar') || el.closest('.edit-toggle')) return false;
    if (el.closest('svg')) return false;
    var slide = el.closest('.slide');
    return !!slide;
  }

  function onHtmlMouseDown(e) {
    if (!editMode || editorMode !== 'hand') return;
    var target = e.target;
    if (!isEditableTarget(target)) return;
    // Don't interfere with SVG events
    if (target.closest('svg')) return;
    // Find meaningful element (not raw text nodes)
    var el = target;
    if (el.tagName === 'BODY' || el.classList.contains('slide')) return;

    // Select
    selectHtmlElement(el);
    htmlDragEl = el;
    htmlDragStart = { x: e.clientX, y: e.clientY };
    htmlDragUndoPushed = false;
    e.preventDefault();
  }

  function onHtmlMouseMove(e) {
    if (!editMode || editorMode !== 'hand' || !htmlDragEl) return;
    if (!htmlDragUndoPushed) { pushUndo(); htmlDragUndoPushed = true; }
    var dx = e.clientX - htmlDragStart.x;
    var dy = e.clientY - htmlDragStart.y;
    moveHtmlElement(htmlDragEl, dx, dy);
    htmlDragStart = { x: e.clientX, y: e.clientY };
    htmlDragEl.classList.add('html-dragging');
  }

  function onHtmlMouseUp(e) {
    if (htmlDragEl) {
      htmlDragEl.classList.remove('html-dragging');
      htmlDragEl = null;
    }
  }

  function onHtmlDblClick(e) {
    if (!editMode || editorMode !== 'hand') return;
    // Switch to pencil to edit text on double-click
    if (isEditableTarget(e.target) && !e.target.closest('svg')) {
      setEditorMode('pencil');
      e.target.focus();
    }
  }

  // ---- Arrow marker ----
  function ensureArrowMarker(svg) {
    if (svg.querySelector('#svg-editor-arrow')) return;
    var defs = svg.querySelector('defs');
    if (!defs) { defs = document.createElementNS(NS, 'defs'); svg.insertBefore(defs, svg.firstChild); }
    var marker = document.createElementNS(NS, 'marker');
    marker.setAttribute('id', 'svg-editor-arrow');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '9'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '6'); marker.setAttribute('markerHeight', '6');
    marker.setAttribute('orient', 'auto-start-reverse');
    var path = document.createElementNS(NS, 'path');
    path.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
    path.setAttribute('fill', '#2c3e50');
    marker.appendChild(path);
    defs.appendChild(marker);
  }

  function cancelAddMode() {
    addingType = null; drawStart = null;
    document.body.style.cursor = '';
    document.querySelectorAll('.svg-add-bar button').forEach(function(b) { b.classList.remove('adding'); });
    document.querySelectorAll('#_tmpDraw').forEach(function(e) { if (e.parentNode) e.parentNode.removeChild(e); });
  }

  function finishPath() {
    var p = document.querySelector('#_tmpPath');
    if (p && pathPoints.length >= 2) { p.removeAttribute('id'); selectSvgElement(p); }
    else if (p && p.parentNode) { p.parentNode.removeChild(p); }
    pathPoints = [];
  }

  // ---- Global add text ----
  // IMPORTANT: do NOT use `transform: translate(-50%, -50%)` for centering.
  // moveHtmlElement parses transforms with regex `translate(Npx, Npx)` and
  // will clobber any percentage-based translate, causing the element to jump
  // by half its own size on first drag. Instead we position with plain px
  // `left`/`top` computed from the slide rect after append.
  window.globalAddText = function() {
    var txt = prompt('输入要添加的文字:', '新文字');
    if (!txt) return;
    pushUndo();
    var activeSlide = document.querySelector('.slide.active');
    if (!activeSlide) return;
    var div = document.createElement('div');
    div.style.cssText = 'font-size:20px;color:#2c3e50;position:absolute;left:0;top:0;text-align:center;z-index:10;white-space:nowrap;padding:4px 8px;';
    div.textContent = txt;
    // Ensure slide has position relative for absolute positioning
    if (getComputedStyle(activeSlide).position === 'static') activeSlide.style.position = 'relative';
    activeSlide.appendChild(div);
    // Measure now that the div is in the DOM, then center via px
    var sr = activeSlide.getBoundingClientRect();
    var dr = div.getBoundingClientRect();
    div.style.left = Math.round(sr.width / 2 - dr.width / 2) + 'px';
    div.style.top  = Math.round(sr.height / 2 - dr.height / 2) + 'px';
    if (editorMode === 'pencil') div.setAttribute('contenteditable', 'true');
    selectHtmlElement(div);
    showToast('已添加文字');
  };

  // ---- Delete selected ----
  window.editorDeleteSelected = function() {
    if (!selectedEl) return;
    pushUndo();
    var el = selectedEl;
    var parent = el.parentNode;
    editorDeselect();
    if (parent) parent.removeChild(el);
    showToast('已删除');
  };

  // ---- Duplicate ----
  window.editorDuplicate = function() {
    if (!selectedEl) return;
    pushUndo();
    var clone = selectedEl.cloneNode(true);
    if (selectedIsSvg) {
      selectedEl.parentNode.appendChild(clone);
      moveSvgElement(clone, 15, 15);
      selectSvgElement(clone);
    } else {
      selectedEl.parentNode.appendChild(clone);
      moveHtmlElement(clone, 15, 15);
      selectHtmlElement(clone);
    }
  };

  window.svgBringForward = function() {
    if (!selectedEl || !selectedIsSvg) return;
    pushUndo();
    var next = selectedEl.nextElementSibling;
    if (next && next !== selectionRect) selectedEl.parentNode.insertBefore(next, selectedEl);
  };

  window.svgSendBackward = function() {
    if (!selectedEl || !selectedIsSvg) return;
    pushUndo();
    var prev = selectedEl.previousElementSibling;
    if (prev) selectedEl.parentNode.insertBefore(selectedEl, prev);
  };

  // ---- Lock/unlock element ----
  window.editorToggleLock = function() {
    if (!selectedEl) return;
    pushUndo();
    var isLocked = selectedEl.classList.contains('editor-locked');
    if (isLocked) {
      selectedEl.classList.remove('editor-locked');
      selectedEl.style.pointerEvents = '';
      showToast('🔓 已解锁');
    } else {
      selectedEl.classList.add('editor-locked');
      selectedEl.style.pointerEvents = 'none';
      showToast('🔒 已固定');
    }
    var lockBtn = document.getElementById('lockBtn');
    if (lockBtn) lockBtn.textContent = isLocked ? '🔒 固定' : '🔓 解锁';
  };

  // ---- Multi-select (Shift+Click) ----
  var multiSelected = []; // array of elements

  function addToMultiSelect(el) {
    if (multiSelected.indexOf(el) >= 0) return;
    multiSelected.push(el);
    if (el.closest && el.closest('svg')) {
      el.classList.add('svg-multi-selected');
    } else {
      el.classList.add('html-selected');
    }
  }

  function clearMultiSelect() {
    multiSelected.forEach(function(el) {
      el.classList.remove('svg-multi-selected', 'html-selected');
    });
    multiSelected = [];
  }

  window.editorGroupSelected = function() {
    if (multiSelected.length < 2) { showToast('请先 Shift+点击 多选元素'); return; }
    // Only group SVG elements in the same SVG
    var svg = multiSelected[0].closest('svg');
    if (!svg) { showToast('只能组合 SVG 元素'); return; }
    var allInSameSvg = multiSelected.every(function(el) { return el.closest('svg') === svg; });
    if (!allInSameSvg) { showToast('只能组合同一个 SVG 内的元素'); return; }

    pushUndo();
    var g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'editor-group');
    // Insert group before first element
    svg.insertBefore(g, multiSelected[0]);
    multiSelected.forEach(function(el) {
      el.classList.remove('svg-multi-selected');
      g.appendChild(el);
    });
    clearMultiSelect();
    selectSvgElement(g);
    showToast('已组合 ' + g.children.length + ' 个元素');
  };

  window.editorUngroupSelected = function() {
    if (!selectedEl || selectedEl.tagName.toLowerCase() !== 'g') {
      showToast('请先选中一个组合'); return;
    }
    pushUndo();
    var g = selectedEl;
    var parent = g.parentNode;
    var next = g.nextSibling;
    while (g.firstChild) {
      parent.insertBefore(g.firstChild, next);
    }
    parent.removeChild(g);
    editorDeselect();
    showToast('已解组');
  };

  // ---- Dynamic line drawing ----
  // Add 'dashAnim' type to SVG add bar
  window.svgAddMode = function(type) {
    if (editorMode !== 'pencil') setEditorMode('pencil');
    if (addingType === type) { cancelAddMode(); return; }
    if (addingType === 'path') finishPath();
    cancelAddMode();
    addingType = type;
    document.body.style.cursor = 'crosshair';
    var btn = document.getElementById('svgAdd' + type.charAt(0).toUpperCase() + type.slice(1));
    if (btn) btn.classList.add('adding');
  };

  // ---- Keyboard shortcuts ----
  document.addEventListener('keydown', function(e) {
    if (!editMode) return;

    // Ctrl+Z undo, Ctrl+Y redo
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
      e.preventDefault(); editorUndo(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || e.key === 'Y')) {
      e.preventDefault(); editorRedo(); return;
    }

    // Ctrl+G group, Ctrl+Shift+G ungroup
    if ((e.ctrlKey || e.metaKey) && e.key === 'g' && !e.shiftKey) {
      e.preventDefault(); editorGroupSelected(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'G' || (e.key === 'g' && e.shiftKey))) {
      e.preventDefault(); editorUngroupSelected(); return;
    }

    // Path finish
    if (addingType === 'path' && (e.key === 'Escape' || e.key === 'Enter')) {
      finishPath(); cancelAddMode(); return;
    }

    // Delete selected
    if (selectedEl && (e.key === 'Delete' || e.key === 'Backspace')) {
      if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
      if (document.querySelector('[contenteditable]:focus')) return;
      e.preventDefault();
      editorDeleteSelected();
      return;
    }

    // Escape to deselect
    if (e.key === 'Escape' && selectedEl && !addingType) {
      editorDeselect(); clearMultiSelect(); return;
    }

    // H = hand, V = pencil
    if (e.key === 'h' || e.key === 'H') {
      if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.getAttribute('contenteditable'))) return;
      setEditorMode('hand');
    }
    if (e.key === 'v' || e.key === 'V') {
      if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.getAttribute('contenteditable'))) return;
      setEditorMode('pencil');
    }
  });
})();
</script>
