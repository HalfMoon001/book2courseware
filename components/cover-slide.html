<!--
  封面页 · 每份课件只有 1 个，永远是 data-slide="0"
  占位符：
    {{SUBJECT_LABEL}}    如 "第二章" / "Chapter 3" / "专题一"
    {{MAIN_TITLE}}       主标题，如 "地球上的大气"
    {{SUBTITLE_EN}}      副标题（可选英文/描述）
    {{COVER_SVG}}        主题装饰 SVG — 没有合适的就用下方 fallback
-->
<div class="slide cover-slide active" data-slide="0">
  {{COVER_SVG}}
  <div class="cover-chapter">{{SUBJECT_LABEL}}</div>
  <div class="cover-title">{{MAIN_TITLE}}</div>
  <div style="font-family:var(--font-subtitle); font-size:24px; color:var(--blue); margin-top:15px; opacity:0.7;">{{SUBTITLE_EN}}</div>
  <div style="font-family:var(--font-subtitle); font-size:18px; color:#999; margin-top:30px;">按 ← → 方向键翻页 &nbsp;|&nbsp; 点击填空查看答案</div>
</div>
