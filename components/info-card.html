<!--
  信息卡 · 堆叠 2-5 个放在 slide-col 里
  占位符：
    {{COLOR}}  red | blue | green | gold | purple
    {{BODY}}   HTML 内容，可带 <b> 和 <span class="keyword keyword-*">

  使用示例：
    <div class="info-card card-blue"><b>概念 A</b> — 这是定义。<span class="keyword keyword-red">关键词</span></div>
    <div class="info-card card-green"><b>要点 B</b> — 具体说明。</div>
-->
<div class="info-card card-{{COLOR}}">{{BODY}}</div>
