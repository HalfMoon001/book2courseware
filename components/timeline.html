<!--
  时间轴 · 横向展示事件序列
  占位符：
    {{ITEMS}}   由若干 timeline-item 组成

  单项模板：
    <div class="timeline-item">
      <div class="timeline-dot"></div>
      <div class="timeline-date">{{DATE}}</div>
      <div class="timeline-label">{{LABEL}}</div>
    </div>

  一般 3-6 个项目为佳。
-->
<div class="timeline">
  {{ITEMS}}
</div>
